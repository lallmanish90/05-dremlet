# Dreamlet CLI Configuration
# This file contains default settings for the Dreamlet CLI
# CLI arguments will override these settings

default_language: English
skip_existing: true
progress_detail: verbose

video:
  fps: 3
  encoder: auto
  resolution: 4K

audio:
  format: mp3
  quality: high

tts:
  speed: 1.0
  normalize: true

translator:
  temperature: 0.3
  model: gemma-3-12b-it-qat

processing:
  force_recreate: false
  batch_size: 10
  max_workers: 4

output:
  create_without_logo: false
  generate_timestamps: false
  save_timestamps: true

logging:
  level: INFO
  file: null

paths:
  input_dir: input
  output_dir: output
  reports_dir: reports

api:
  openai_api_key: null
  kokoro_api_url: http://localhost:8880/v1