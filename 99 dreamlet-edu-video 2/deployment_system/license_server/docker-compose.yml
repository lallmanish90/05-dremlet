version: '3.8'

services:
  license-server:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - license_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-your_secret_key_here}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-your_admin_api_key_here}
      - DATABASE_URL=sqlite:///data/licenses.db
    restart: unless-stopped
    
volumes:
  license_data:
    driver: local